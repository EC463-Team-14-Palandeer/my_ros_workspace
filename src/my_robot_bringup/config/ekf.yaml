ekf_local:
  ros__parameters:
    frequency: 30.0
    two_d_mode: false
    publish_tf: true

    map_frame: map
    odom_frame: odom
    base_link_frame: base_footprint
    world_frame: odom  # Local EKF: publishes odom -> base_link

    # 1. VISUAL SLAM ODOMETRY
    odom0: /visual_slam/tracking/odometry
    odom0_config: [true,  true,  true,   # X, Y, Z
                   false,  false,  false,   # Roll, Pitch, Yaw
                   false, false, false,  # X, Y, Z velocities
                   false, false, false,  # Roll, Pitch, Yaw velocities
                   false, false, false]  # X, Y, Z accelerations
    odom0_relative: false 
    odom0_qos: reliable

    # 2. WITMOTION IMU
    imu0: /imu/data
    imu0_config: [false, false, false,   # Do not trust IMU for absolute XYZ position
                  true,  true,  true,    # Orientation (Roll, Pitch, Yaw)
                  false, false, false,   # Velocity
                  true,  true,  true,    # Rotational Velocity
                  false, false, false]   # Acceleration
    imu0_remove_gravitational_acceleration: true
    imu0_qos: reliable

ekf_global:
  ros__parameters:
    frequency: 30.0
    two_d_mode: false
    publish_tf: true

    map_frame: map
    odom_frame: odom
    base_link_frame: base_footprint
    world_frame: map  # Global EKF: publishes map -> odom

    # 1. VISUAL SLAM ODOMETRY
    odom0: /visual_slam/tracking/odometry
    odom0_config: [true,  true,  true,
                   false,  false,  false,
                   false, false, false,
                   false, false, false,
                   false, false, false]
    odom0_relative: false 
    odom0_differential: true
    odom0_qos: reliable

    # 2. WITMOTION IMU
    imu0: /imu/data
    imu0_config: [false, false, false,
                  true,  true,  true,
                  false, false, false,
                  true,  true,  true,
                  false, false, false]
    imu0_remove_gravitational_acceleration: true
    imu0_qos: reliable

    # Crucial for Webots/Hardware:
    imu0_nodelay: true                   # Add this to reduce latency
    imu0_differential: false             # Set to true if orientation "jumps" at start
    imu0_relative: true

    # 3. GPS ODOMETRY (from navsat_transform)
    odom1: /odometry/gps
    odom1_config: [true,  true,  false,  # Absolute X, Y from GPS
                   false, false, false,
                   false, false, false,
                   false, false, false,
                   false, false, false]
    odom1_differential: false
    odom1_qos: reliable

navsat_transform:
  ros__parameters:
    frequency: 30.0
    delay: 3.0
    magnetic_declination_radians: -0.2513 
    yaw_offset: 1.5708 
    zero_altitude: true
    broadcast_cartesian_transform: false
    publish_filtered_gps: true
    use_odometry_yaw: false
    wait_for_datum: false