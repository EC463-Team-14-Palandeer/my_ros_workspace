costmap: # <--- Changed to match native node name
  costmap: # <--- Internal costmap object name
    ros__parameters:
      use_sim_time: False
      update_frequency: 5.0
      publish_frequency: 5.0
      global_frame: odom
      robot_base_frame: base_footprint
      rolling_window: true
      width: 4
      height: 4
      resolution: 0.05
      robot_radius: 0.45
      
      # Removed static_layer, and fixed the execution order (draw obstacles, THEN inflate them)
      plugins: ["nvblox_layer", "range_layer", "inflation_layer"] 
      
      nvblox_layer:
        plugin: "nvblox::nav2::NvbloxCostmapLayer"
        nvblox_map_slice_topic: "/nvblox_node/combined_map_slice"

      # --- NEW ULTRASONIC LAYER ---
      range_layer:
        plugin: "nav2_costmap_2d::RangeSensorLayer"
        topics: [
          '/ultrasound/front',
          '/ultrasound/front_left',
          '/ultrasound/front_right',
          '/ultrasound/side_right_front',
          '/ultrasound/side_right_back',
          '/ultrasound/side_left_front',
          '/ultrasound/side_left_back',
          '/ultrasound/rear',
          '/ultrasound/rear_left',
          '/ultrasound/rear_right'
        ]
        clear_on_max_reading: true # Tells Nav2 that if a sensor reads nothing, that space is empty
        clear_threshold: 0.2       # Probability threshold for clearing cells
        mark_threshold: 0.8        # Probability threshold for marking an obstacle
      # ----------------------------

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        enabled: True
        inflation_radius: 0.6
        cost_scaling_factor: 3.0