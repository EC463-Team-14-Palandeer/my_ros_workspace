global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: False
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_footprint
      rolling_window: true
      width: 50
      height: 50
      resolution: 0.1
      robot_radius: 0.45
      transform_tolerance: 1.0
      
      # The Global planner needs to see the Fence and Nvblox to plan a valid path
      plugins: ["virtual_fence_layer", "nvblox_layer", "inflation_layer"]

      virtual_fence_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        observation_sources: fence_cloud
        fence_cloud:
          topic: /geofence_points
          data_type: PointCloud2
          marking: True
          clearing: True
          observation_persistence: 0.0 # PointCloud remains until the next one arrives

      nvblox_layer:
        plugin: "nvblox::nav2::NvbloxCostmapLayer"
        nvblox_map_slice_topic: "/nvblox_node/combined_map_slice"

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.7
        cost_scaling_factor: 3.0

local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: False
      update_frequency: 5.0
      publish_frequency: 5.0
      global_frame: odom
      robot_base_frame: base_footprint
      rolling_window: true
      width: 4
      height: 4
      resolution: 0.05
      robot_radius: 0.45
      transform_tolerance: 1.0
      
      # Local planner needs everything for fast reaction
      plugins: ["virtual_fence_layer", "nvblox_layer", "range_layer", "inflation_layer"]

      virtual_fence_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        observation_sources: fence_cloud
        fence_cloud:
          topic: /geofence_points
          data_type: PointCloud2
          marking: True
          clearing: True

      nvblox_layer:
        plugin: "nvblox::nav2::NvbloxCostmapLayer"
        nvblox_map_slice_topic: "/nvblox_node/combined_map_slice"

      range_layer:
        plugin: "nav2_costmap_2d::RangeSensorLayer"
        topics: [
          '/ultrasound/front', '/ultrasound/front_left', '/ultrasound/front_right',
          '/ultrasound/side_right_front', '/ultrasound/side_right_back',
          '/ultrasound/side_left_front', '/ultrasound/side_left_back',
          '/ultrasound/rear', '/ultrasound/rear_left', '/ultrasound/rear_right'
        ]
        clear_on_max_reading: true
        clear_threshold: 0.2
        mark_threshold: 0.8

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.6
        cost_scaling_factor: 3.0

planner_server:
  ros__parameters:
    expected_planner_frequency: 1.0
    use_sim_time: False
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner/NavfnPlanner" # Standard global planner

controller_server:
  ros__parameters:
    use_sim_time: False
    controller_frequency: 20.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.5
    min_theta_velocity_threshold: 0.001
    controller_plugins: ["FollowPath"]
    FollowPath:
      plugin: "dwb_core::DWBLocalPlanner" # Standard local controller
      critics: ["RotateToGoal", "Oscillation", "BaseObstacle", "GoalAlign", "PathAlign", "PathDist", "GoalDist"]